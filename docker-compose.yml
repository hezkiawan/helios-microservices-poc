version: '3.8'

services:
  # ==========================================
  # THE DATA LAYER
  # ==========================================
  registry-db:
    image: postgres:15-alpine
    container_name: registry-db
    environment:
      - POSTGRES_USER=helios_admin
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=registry_db
    ports:
      - "5432:5432"
    networks:
      - helios-network
    volumes:
      - registry_data:/var/lib/postgresql/data

  telemetry-db:
    image: redis:7-alpine
    container_name: telemetry-db
    ports:
      - "6379:6379"
    networks:
      - helios-network
    volumes:
      - telemetry_data:/data

  # ==========================================
  # THE EVENT BUS (KAFKA)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - helios-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # This tells Kafka how to talk to other containers vs your local machine
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - helios-network

  # ==========================================
  # THE MICROSERVICES
  # ==========================================
  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8081:8081"
    depends_on:
      - registry-db
      - kafka
    networks:
      - helios-network

  service-telemetry:
    build: ./service-telemetry
    container_name: service-telemetry
    ports:
      - "8082:8082"
    depends_on:
      - telemetry-db
      - kafka
    networks:
      - helios-network

  # ==========================================
  # THE FRONTEND ORCHESTRATOR (BFF)
  # ==========================================
  frontend-dashboard:
    build: ./frontend-dashboard
    container_name: frontend-dashboard
    ports:
      - "3000:3000"
    environment:
      # Next.js uses these internal Docker DNS names to fetch data!
      - REGISTRY_URL=http://service-registry:8081
      - TELEMETRY_URL=http://service-telemetry:8082
    depends_on:
      - service-registry
      - service-telemetry
    networks:
      - helios-network

networks:
  helios-network:
    driver: bridge

volumes:
  registry_data:
  telemetry_data: